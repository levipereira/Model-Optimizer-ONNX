    - "^/model\\.10/cv2/conv/Conv$"
    - "^/model\\.13/cv1/conv/Conv$"
    - "^/model\\.13/m\\.0/cv1/conv/Conv$"
    - "^/model\\.13/m\\.0/cv2/conv/Conv$"
    - "^/model\\.13/m\\.0/m/m\\.0/cv1/conv/Conv$"
