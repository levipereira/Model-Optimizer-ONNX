    - "^/model\\.19/m\\.0/cv1/conv/Conv$"
    - "^/model\\.19/m\\.0/cv2/conv/Conv$"
    - "^/model\\.23/one2one_cv3\\.0/one2one_cv3\\.0\\.1/one2one_cv3\\.0\\.1\\.1/conv/Conv$"
    - "^/model\\.19/m\\.0/m/m\\.0/cv1/conv/Conv$"
    - "^/model\\.23/one2one_cv3\\.0/one2one_cv3\\.0\\.2/Conv$"
    - "^/model\\.19/m\\.0/m/m\\.0/cv2/conv/Conv$"
    - "^/model\\.19/m\\.0/m/m\\.1/cv1/conv/Conv$"
    - "^/model\\.19/m\\.0/m/m\\.1/cv2/conv/Conv$"
    - "^/model\\.19/m\\.0/cv3/conv/Conv$"
    - "^/model\\.19/cv2/conv/Conv$"

  exclude_op_types:
    - Sigmoid
    - Softmax

  exclude_nodes:
    - "^.+/act/Mul$"

  extra_args: []
